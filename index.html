<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PropFind — Sydney</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #030712; overflow: hidden; }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-track { background: transparent; }
    .scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    .leaflet-control-zoom { margin-bottom: 80px !important; margin-right: 12px !important; }
    .leaflet-control-zoom a { background: #111827 !important; color: #e5e7eb !important; border-color: #374151 !important; }
    .leaflet-control-zoom a:hover { background: #1f2937 !important; }
    .leaflet-control-attribution { display: none; }
    .marker-pill { transition: transform 0.1s; }
    .marker-pill:hover { transform: scale(1.1); }
    @keyframes slideUp { from { transform: translateY(100%); opacity:0 } to { transform: translateY(0); opacity:1 } }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .slide-up { animation: slideUp 0.25s ease-out; }
    .fade-in { animation: fadeIn 0.15s ease-out; }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─────────────────────────────────────────────────────────────
// CONFIGURATION — set your Railway URL here before deploying
// ─────────────────────────────────────────────────────────────
const BACKEND_URL = 'https://propfind.railway.internal'; 

// ─────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────
const SOURCE_COLOR = { domain: '#1a56db', realestate: '#dc2626' };
const SOURCE_LABEL = { domain: 'Domain', realestate: 'REA' };
const TWELVE_MONTHS_AGO = new Date(Date.now() - 365 * 24 * 60 * 60 * 1000);
const PROP_EMOJI = { House: '🏡', Apartment: '🏢', Terrace: '🏘', Unit: '🏢', Townhouse: '🏘' };

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
const fmt = (n) => {
  if (!n) return null;
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 2).replace(/\.?0+$/, '') + 'm';
  return '$' + n.toLocaleString('en-AU');
};
const fmtRange = (min, max) => {
  if (!min && !max) return null;
  if (min && max && min !== max) return `${fmt(min)} – ${fmt(max)}`;
  return fmt(min || max);
};
const fmtDate = (d, opts = {}) => new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', ...opts });

// ─────────────────────────────────────────────────────────────
// FILTERING
// ─────────────────────────────────────────────────────────────
const INIT_FILTERS = {
  listingType: 'buy',
  postcodes: [],
  propertyTypes: [],
  priceMin: '',
  priceMax: '',
  bedrooms: 0,
  bathrooms: 0,
  carSpaces: 0,
  landSizeMin: '',
  landSizeMax: '',
};

const applyFilters = (listings, f) => listings.filter(l => {
  if (f.listingType === 'buy' && (l.status !== 'active' || l.listingType !== 'buy')) return false;
  if (f.listingType === 'sold') {
    if (l.status !== 'sold') return false;
    if (new Date(l.soldDate) < TWELVE_MONTHS_AGO) return false;
  }
  if (f.postcodes.length && !f.postcodes.includes(l.address.postcode)) return false;
  if (f.propertyTypes.length && !f.propertyTypes.includes(l.propertyType)) return false;
  const pricePt = l._meta.soldPrice || l._meta.priceGuide?.min;
  if (f.priceMin && pricePt && pricePt < +f.priceMin) return false;
  if (f.priceMax && pricePt && pricePt > +f.priceMax) return false;
  if (f.bedrooms > 0 && l.bedrooms < f.bedrooms) return false;
  if (f.bathrooms > 0 && l.bathrooms < f.bathrooms) return false;
  if (f.carSpaces > 0 && l.carSpaces < f.carSpaces) return false;
  if (f.landSizeMin && l.landSize && l.landSize < +f.landSizeMin) return false;
  if (f.landSizeMax && l.landSize && l.landSize > +f.landSizeMax) return false;
  return true;
});

// ─────────────────────────────────────────────────────────────
// MAP MARKER ICONS
// ─────────────────────────────────────────────────────────────
const makeIcon = (listing, selected) => {
  const sold = listing.status === 'sold';
  const bg = selected ? '#1d4ed8' : sold ? '#c2410c' : '#065f46';
  const border = selected ? '#93c5fd' : sold ? '#fdba74' : '#6ee7b7';
  const sp = listing._meta.soldPrice;
  const pg = listing._meta.priceGuide;
  const label = sp ? fmt(sp) : pg ? fmt(pg.min) + '+' : '?';
  const size = selected ? 14 : 11;

  return L.divIcon({
    className: '',
    html: `<div class="marker-pill" style="background:${bg};color:white;padding:3px 8px;border-radius:10px;font-size:${size}px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:1.5px solid ${border};font-family:system-ui,sans-serif;cursor:pointer;letter-spacing:-0.2px">${label}</div>`,
    iconSize: null,
    iconAnchor: [0, 12],
    zIndexOffset: selected ? 1000 : 0,
  });
};

// ─────────────────────────────────────────────────────────────
// MAP COMPONENT
// ─────────────────────────────────────────────────────────────
const MapView = ({ listings, selectedId, onSelect }) => {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef({});

  useEffect(() => {
    if (mapRef.current) return;
    mapRef.current = L.map(containerRef.current, {
      center: [-33.885, 151.19],
      zoom: 13,
      zoomControl: false,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_no_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapRef.current);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19, opacity: 0.8 }).addTo(mapRef.current);
    L.control.zoom({ position: 'bottomright' }).addTo(mapRef.current);
  }, []);

  useEffect(() => {
    if (!mapRef.current) return;
    const existing = new Set(Object.keys(markersRef.current));
    const incoming = new Set(listings.map(l => l.id));
    existing.forEach(id => {
      if (!incoming.has(id)) { markersRef.current[id].remove(); delete markersRef.current[id]; }
    });
    listings.forEach(l => {
      const sel = l.id === selectedId;
      if (markersRef.current[l.id]) {
        markersRef.current[l.id].setIcon(makeIcon(l, sel));
        markersRef.current[l.id].setZIndexOffset(sel ? 1000 : 0);
      } else {
        const m = L.marker([l.coordinates.lat, l.coordinates.lng], { icon: makeIcon(l, sel) })
          .addTo(mapRef.current)
          .on('click', () => onSelect(l));
        markersRef.current[l.id] = m;
      }
    });
  }, [listings, selectedId]);

  useEffect(() => {
    if (!mapRef.current || !selectedId) return;
    const l = listings.find(x => x.id === selectedId);
    if (l) mapRef.current.panTo([l.coordinates.lat, l.coordinates.lng], { animate: true, duration: 0.4 });
  }, [selectedId, listings]);

  return <div ref={containerRef} style={{ height: '100%', width: '100%' }} />;
};

// ─────────────────────────────────────────────────────────────
// LISTING CARD
// ─────────────────────────────────────────────────────────────
const Card = ({ listing: l, selected, onClick }) => {
  const pg = l._meta.priceGuide;
  const sp = l._meta.soldPrice;
  const isHidden = ['Contact Agent', 'Price on Application'].includes(l.displayPrice);

  return (
    <div onClick={onClick} style={{
      background: selected ? '#0f2044' : '#111827',
      border: `1px solid ${selected ? '#3b82f6' : '#1f2937'}`,
      borderRadius: 14, overflow: 'hidden', cursor: 'pointer',
      marginBottom: 10, transition: 'border-color 0.15s, background 0.15s',
      boxShadow: selected ? '0 0 0 1px #3b82f6, 0 4px 20px rgba(59,130,246,0.15)' : 'none',
    }}>
      <div style={{ height: 130, background: 'linear-gradient(135deg, #1f2937 0%, #111827 100%)', position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ fontSize: 52, opacity: 0.12 }}>{PROP_EMOJI[l.propertyType] || '🏠'}</span>
        <div style={{ position: 'absolute', top: 8, left: 8, display: 'flex', gap: 5 }}>
          <span style={{ background: SOURCE_COLOR[l.source], color: 'white', fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 20 }}>{SOURCE_LABEL[l.source]}</span>
          <span style={{ background: '#1f2937', border: '1px solid #374151', color: '#9ca3af', fontSize: 10, padding: '2px 7px', borderRadius: 20 }}>{l.propertyType}</span>
        </div>
        {l.status === 'sold' && <span style={{ position: 'absolute', top: 8, right: 8, background: '#c2410c', color: 'white', fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 20 }}>SOLD</span>}
        {l._meta.auctionDate && <span style={{ position: 'absolute', bottom: 8, right: 8, background: '#5b21b6', color: 'white', fontSize: 10, fontWeight: 600, padding: '2px 7px', borderRadius: 20 }}>🔨 {fmtDate(l._meta.auctionDate)}</span>}
        {l._meta.daysOnMarket <= 7 && !sp && <span style={{ position: 'absolute', bottom: 8, left: 8, background: '#0369a1', color: 'white', fontSize: 10, fontWeight: 600, padding: '2px 7px', borderRadius: 20 }}>NEW</span>}
      </div>
      <div style={{ padding: '10px 12px 12px' }}>
        <p style={{ color: '#9ca3af', fontSize: 12, marginBottom: 6, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{l.address.display}</p>
        <div style={{ marginBottom: 8 }}>
          {sp
            ? <><span style={{ fontWeight: 700, color: '#fb923c', fontSize: 16 }}>{fmt(sp)}</span><span style={{ color: '#6b7280', fontSize: 11, marginLeft: 6 }}>sold {fmtDate(l.soldDate)}</span></>
            : <span style={{ fontWeight: 700, color: isHidden ? '#6b7280' : '#f9fafb', fontSize: 16 }}>{l.displayPrice}</span>
          }
          {pg && (
            <div style={{ marginTop: 5 }}>
              <span style={{ background: '#022c22', border: '1px solid #064e3b', color: '#34d399', fontSize: 11, fontWeight: 600, padding: '3px 8px', borderRadius: 20, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                🔍 {fmtRange(pg.min, pg.max)}
              </span>
            </div>
          )}
        </div>
        <div style={{ display: 'flex', gap: 14, color: '#9ca3af', fontSize: 13, flexWrap: 'wrap' }}>
          {l.bedrooms > 0 && <span>🛏 {l.bedrooms}</span>}
          {l.bathrooms > 0 && <span>🚿 {l.bathrooms}</span>}
          {l.carSpaces > 0 && <span>🚗 {l.carSpaces}</span>}
          {l.landSize && <span>📐 {l.landSize}m²</span>}
          {!l.landSize && l.floorSize && <span>📐 {l.floorSize}m²</span>}
        </div>
        <div style={{ marginTop: 8, color: '#4b5563', fontSize: 11 }}>{l.agency}</div>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// LISTING DETAIL MODAL
// ─────────────────────────────────────────────────────────────
const Detail = ({ listing: l, onClose }) => {
  const pg = l._meta.priceGuide;
  const sp = l._meta.soldPrice;

  return (
    <div className="fade-in" onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(0,0,0,0.75)', display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
      <div className="slide-up scroll" onClick={e => e.stopPropagation()} style={{ width: '100%', maxWidth: 520, maxHeight: '88vh', overflowY: 'auto', background: '#111827', borderRadius: '20px 20px 0 0', borderTop: '1px solid #1f2937' }}>
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}>
          <div style={{ width: 36, height: 4, background: '#374151', borderRadius: 2 }} />
        </div>
        <div style={{ padding: '12px 20px 16px', borderBottom: '1px solid #1f2937' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div style={{ flex: 1, paddingRight: 12 }}>
              <div style={{ display: 'flex', gap: 6, marginBottom: 8, flexWrap: 'wrap' }}>
                <span style={{ background: SOURCE_COLOR[l.source], color: 'white', fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 20 }}>{SOURCE_LABEL[l.source]}</span>
                <span style={{ background: '#1f2937', border: '1px solid #374151', color: '#9ca3af', fontSize: 10, padding: '2px 8px', borderRadius: 20 }}>{l.propertyType}</span>
                {l.status === 'sold' && <span style={{ background: '#7c2d12', color: '#fed7aa', fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 20 }}>SOLD</span>}
              </div>
              <h2 style={{ color: 'white', fontWeight: 700, fontSize: 17, margin: 0, lineHeight: 1.3 }}>{l.address.display}</h2>
            </div>
            <button onClick={onClose} style={{ background: '#1f2937', border: 'none', color: '#9ca3af', width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>✕</button>
          </div>
        </div>
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: '#0d1117', borderRadius: 14, padding: 16, border: '1px solid #1f2937' }}>
            <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Price Information</div>
            <div style={{ fontSize: 26, fontWeight: 800, color: sp ? '#fb923c' : '#f9fafb', marginBottom: 4 }}>
              {sp ? fmt(sp) : l.displayPrice}
            </div>
            {sp && <div style={{ color: '#9ca3af', fontSize: 13 }}>Sold {new Date(l.soldDate).toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>}
            {pg && (
              <div style={{ marginTop: 12, background: '#022c22', border: '1px solid #064e3b', borderRadius: 10, padding: 12 }}>
                <div style={{ color: '#34d399', fontSize: 11, fontWeight: 700, marginBottom: 4, letterSpacing: 0.5 }}>🔍 EXTRACTED PRICE GUIDE — from raw API payload</div>
                <div style={{ color: '#6ee7b7', fontSize: 22, fontWeight: 800 }}>{fmtRange(pg.min, pg.max)}</div>
                <div style={{ color: '#065f46', fontSize: 11, marginTop: 4 }}>Present in the API JSON response but suppressed on the listing page</div>
              </div>
            )}
            {l._meta.auctionDate && (
              <div style={{ marginTop: 10, background: '#1e1b4b', border: '1px solid #3730a3', borderRadius: 10, padding: 12 }}>
                <div style={{ color: '#a5b4fc', fontSize: 11, fontWeight: 700, marginBottom: 4 }}>🔨 AUCTION</div>
                <div style={{ color: 'white', fontWeight: 700, fontSize: 15 }}>{new Date(l._meta.auctionDate).toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
                <div style={{ color: '#818cf8', fontSize: 13 }}>{new Date(l._meta.auctionDate).toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true })}</div>
              </div>
            )}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
            {[
              l.bedrooms && { icon: '🛏', label: 'Beds', value: l.bedrooms },
              l.bathrooms && { icon: '🚿', label: 'Baths', value: l.bathrooms },
              l.carSpaces > 0 && { icon: '🚗', label: 'Cars', value: l.carSpaces },
              l.landSize && { icon: '📐', label: 'Land', value: l.landSize + 'm²' },
              l.floorSize && { icon: '🏠', label: 'Floor', value: l.floorSize + 'm²' },
              { icon: '📅', label: 'Listed', value: fmtDate(l.listingDate) },
            ].filter(Boolean).map((s, i) => (
              <div key={i} style={{ background: '#1f2937', borderRadius: 10, padding: '10px 8px', textAlign: 'center' }}>
                <div style={{ fontSize: 20, marginBottom: 2 }}>{s.icon}</div>
                <div style={{ color: 'white', fontWeight: 700, fontSize: 14 }}>{s.value}</div>
                <div style={{ color: '#6b7280', fontSize: 11 }}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{ background: '#0d1117', borderRadius: 14, padding: 16, border: '1px solid #1f2937' }}>
            <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Listing Analytics — API metadata</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, textAlign: 'center' }}>
              <div><div style={{ color: 'white', fontWeight: 700, fontSize: 18 }}>{l._meta.daysOnMarket}</div><div style={{ color: '#6b7280', fontSize: 11 }}>Days on market</div></div>
              <div><div style={{ color: 'white', fontWeight: 700, fontSize: 18 }}>{l._meta.views?.toLocaleString()}</div><div style={{ color: '#6b7280', fontSize: 11 }}>Views</div></div>
              {l._meta.enquiries ? <div><div style={{ color: 'white', fontWeight: 700, fontSize: 18 }}>{l._meta.enquiries}</div><div style={{ color: '#6b7280', fontSize: 11 }}>Enquiries</div></div> : <div />}
            </div>
          </div>
          {l.description && (
            <div>
              <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>About</div>
              <p style={{ color: '#d1d5db', fontSize: 14, lineHeight: 1.6, margin: 0 }}>{l.description}</p>
            </div>
          )}
          {l.features?.length > 0 && (
            <div>
              <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Features</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {l.features.map((f, i) => <span key={i} style={{ background: '#1f2937', border: '1px solid #374151', color: '#d1d5db', fontSize: 12, padding: '4px 10px', borderRadius: 20 }}>{f}</span>)}
              </div>
            </div>
          )}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: '#1f2937', borderRadius: 12, padding: 14 }}>
            <div style={{ width: 40, height: 40, borderRadius: '50%', background: '#374151', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>👤</div>
            <div>
              <div style={{ color: 'white', fontWeight: 600, fontSize: 14 }}>{l.agentName}</div>
              <div style={{ color: '#6b7280', fontSize: 12 }}>{l.agency}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// FILTER PANEL
// ─────────────────────────────────────────────────────────────
const Btn = ({ active, onClick, children, style = {} }) => (
  <button onClick={onClick} style={{ padding: '6px 14px', borderRadius: 20, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 600, background: active ? '#2563eb' : '#1f2937', color: active ? 'white' : '#9ca3af', transition: 'all 0.15s', ...style }}>{children}</button>
);

const Input = ({ placeholder, value, onChange }) => (
  <input type="number" placeholder={placeholder} value={value} onChange={e => onChange(e.target.value)}
    style={{ flex: 1, background: '#1f2937', border: '1px solid #374151', borderRadius: 10, padding: '8px 12px', color: 'white', fontSize: 13, outline: 'none', minWidth: 0 }} />
);

const FilterPanel = ({ filters, onApply, onClose, allListings }) => {
  const [f, setF] = useState(filters);
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const toggle = (k, v) => setF(p => ({ ...p, [k]: p[k].includes(v) ? p[k].filter(x => x !== v) : [...p[k], v] }));
  const count = applyFilters(allListings, f).length;

  // Derive filter options from live data
  const postcodes = [...new Set(allListings.map(l => l.address.postcode))].sort();
  const propertyTypes = [...new Set(allListings.map(l => l.propertyType))].sort();

  return (
    <div className="fade-in" onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 50, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'flex-end' }}>
      <div className="slide-up scroll" onClick={e => e.stopPropagation()} style={{ width: '100%', maxHeight: '88vh', overflowY: 'auto', background: '#111827', borderRadius: '20px 20px 0 0', padding: 20, display: 'flex', flexDirection: 'column', gap: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'center' }}><div style={{ width: 36, height: 4, background: '#374151', borderRadius: 2 }} /></div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h2 style={{ color: 'white', fontWeight: 700, fontSize: 18, margin: 0 }}>Filters</h2>
          <button onClick={onClose} style={{ background: '#1f2937', border: 'none', color: '#9ca3af', width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', fontSize: 18 }}>✕</button>
        </div>

        <div>
          <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Listing Type</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn active={f.listingType === 'buy'} onClick={() => set('listingType', 'buy')}>For Sale</Btn>
            <Btn active={f.listingType === 'sold'} onClick={() => set('listingType', 'sold')}>Sold (12mo)</Btn>
          </div>
        </div>

        {postcodes.length > 0 && (
          <div>
            <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Postcode</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {postcodes.map(pc => <Btn key={pc} active={f.postcodes.includes(pc)} onClick={() => toggle('postcodes', pc)}>{pc}</Btn>)}
            </div>
          </div>
        )}

        {propertyTypes.length > 0 && (
          <div>
            <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Property Type</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {propertyTypes.map(t => <Btn key={t} active={f.propertyTypes.includes(t)} onClick={() => toggle('propertyTypes', t)}>{t}</Btn>)}
            </div>
          </div>
        )}

        <div>
          <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Price Range</div>
          <div style={{ display: 'flex', gap: 10 }}>
            <Input placeholder="Min $" value={f.priceMin} onChange={v => set('priceMin', v)} />
            <Input placeholder="Max $" value={f.priceMax} onChange={v => set('priceMax', v)} />
          </div>
        </div>

        <div>
          <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Bedrooms (min)</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[0,1,2,3,4,5].map(n => <Btn key={n} active={f.bedrooms === n} onClick={() => set('bedrooms', n)} style={{ width: 44, padding: '6px 0', textAlign: 'center' }}>{n === 0 ? 'Any' : n === 5 ? '5+' : n}</Btn>)}
          </div>
        </div>

        <div>
          <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Bathrooms (min)</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[0,1,2,3,4].map(n => <Btn key={n} active={f.bathrooms === n} onClick={() => set('bathrooms', n)} style={{ width: 44, padding: '6px 0', textAlign: 'center' }}>{n === 0 ? 'Any' : n === 4 ? '4+' : n}</Btn>)}
          </div>
        </div>

        <div>
          <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Car Spaces (min)</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[0,1,2,3].map(n => <Btn key={n} active={f.carSpaces === n} onClick={() => set('carSpaces', n)} style={{ width: 44, padding: '6px 0', textAlign: 'center' }}>{n === 0 ? 'Any' : n === 3 ? '3+' : n}</Btn>)}
          </div>
        </div>

        <div>
          <div style={{ color: '#6b7280', fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Land Size (m²)</div>
          <div style={{ display: 'flex', gap: 10 }}>
            <Input placeholder="Min" value={f.landSizeMin} onChange={v => set('landSizeMin', v)} />
            <Input placeholder="Max" value={f.landSizeMax} onChange={v => set('landSizeMax', v)} />
          </div>
        </div>

        <div style={{ display: 'flex', gap: 10, paddingBottom: 8 }}>
          <button onClick={() => { onApply(f); onClose(); }} style={{ flex: 1, padding: '14px 0', background: '#2563eb', border: 'none', borderRadius: 12, color: 'white', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}>
            Show {count} result{count !== 1 ? 's' : ''}
          </button>
          <button onClick={() => { setF(INIT_FILTERS); onApply(INIT_FILTERS); }} style={{ padding: '14px 20px', background: '#1f2937', border: '1px solid #374151', borderRadius: 12, color: '#9ca3af', fontWeight: 600, fontSize: 14, cursor: 'pointer' }}>
            Reset
          </button>
        </div>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// LOADING SCREEN
// ─────────────────────────────────────────────────────────────
const LoadingScreen = () => (
  <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#030712', gap: 20 }}>
    <div style={{ color: '#60a5fa', fontWeight: 800, fontSize: 28, letterSpacing: -0.5 }}>PropFind</div>
    <div className="spinner" style={{ width: 36, height: 36, border: '3px solid #1f2937', borderTopColor: '#3b82f6', borderRadius: '50%' }} />
    <div style={{ color: '#4b5563', fontSize: 14 }}>Loading listings…</div>
  </div>
);

// ─────────────────────────────────────────────────────────────
// ERROR SCREEN
// ─────────────────────────────────────────────────────────────
const ErrorScreen = ({ onRetry }) => (
  <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#030712', gap: 16, padding: 32 }}>
    <div style={{ color: '#60a5fa', fontWeight: 800, fontSize: 28, letterSpacing: -0.5, marginBottom: 8 }}>PropFind</div>
    <div style={{ fontSize: 40 }}>⚠️</div>
    <div style={{ color: 'white', fontWeight: 700, fontSize: 18 }}>Couldn't connect to backend</div>
    {!BACKEND_URL ? (
      <div style={{ background: '#111827', border: '1px solid #374151', borderRadius: 12, padding: 20, maxWidth: 420, width: '100%' }}>
        <div style={{ color: '#f87171', fontSize: 13, fontWeight: 600, marginBottom: 8 }}>BACKEND_URL is not set</div>
        <div style={{ color: '#9ca3af', fontSize: 13, lineHeight: 1.6 }}>
          Open <code style={{ background: '#1f2937', padding: '1px 5px', borderRadius: 4, color: '#60a5fa' }}>index.html</code> and update line 41:
        </div>
        <div style={{ background: '#0d1117', borderRadius: 8, padding: 12, marginTop: 10, fontFamily: 'monospace', fontSize: 12, color: '#34d399' }}>
          const BACKEND_URL = 'https://your-railway-url.up.railway.app';
        </div>
      </div>
    ) : (
      <div style={{ background: '#111827', border: '1px solid #374151', borderRadius: 12, padding: 20, maxWidth: 420, width: '100%' }}>
        <div style={{ color: '#f87171', fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Failed to reach backend</div>
        <div style={{ color: '#6b7280', fontSize: 12, fontFamily: 'monospace', marginBottom: 12, wordBreak: 'break-all' }}>{BACKEND_URL}</div>
        <div style={{ color: '#9ca3af', fontSize: 13, lineHeight: 1.6 }}>Check that your Railway service is running and the URL is correct. Check the Railway logs for errors.</div>
      </div>
    )}
    {BACKEND_URL && (
      <button onClick={onRetry} style={{ marginTop: 8, padding: '12px 28px', background: '#2563eb', border: 'none', borderRadius: 12, color: 'white', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
        Retry
      </button>
    )}
  </div>
);

// ─────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────
const App = () => {
  const [allListings, setAllListings] = useState([]);
  const [status, setStatus] = useState('loading'); // 'loading' | 'live' | 'error'
  const [filters, setFilters] = useState(INIT_FILTERS);
  const [selectedId, setSelectedId] = useState(null);
  const [showFilters, setShowFilters] = useState(false);
  const [listVisible, setListVisible] = useState(true);
  const listRef = useRef(null);

  const fetchAll = useCallback(async () => {
    if (!BACKEND_URL) { setStatus('error'); return; }
    setStatus('loading');
    try {
      const [buyRes, soldRes] = await Promise.all([
        fetch(`${BACKEND_URL}/api/listings?listingType=buy`),
        fetch(`${BACKEND_URL}/api/listings?listingType=sold`),
      ]);
      if (!buyRes.ok || !soldRes.ok) throw new Error('Bad response from backend');
      const [buyData, soldData] = await Promise.all([buyRes.json(), soldRes.json()]);
      const combined = [...(buyData.listings || []), ...(soldData.listings || [])];
      if (combined.length === 0) throw new Error('No listings returned');
      setAllListings(combined);
      setStatus('live');
    } catch (err) {
      console.error('PropFind fetch error:', err.message);
      setStatus('error');
    }
  }, []);

  useEffect(() => { fetchAll(); }, [fetchAll]);

  const listings = useMemo(() => applyFilters(allListings, filters), [allListings, filters]);

  const handleSelect = useCallback(l => {
    setSelectedId(p => p === l.id ? null : l.id);
    setListVisible(true);
  }, []);

  const selected = listings.find(l => l.id === selectedId) || null;

  const activeCount = Object.entries(filters).filter(([k, v]) => {
    if (k === 'listingType') return false;
    if (Array.isArray(v)) return v.length > 0;
    if (typeof v === 'number') return v > 0;
    return v !== '';
  }).length;

  if (status === 'loading') return <LoadingScreen />;
  if (status === 'error') return <ErrorScreen onRetry={fetchAll} />;

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: '#030712', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ background: '#0d1117', borderBottom: '1px solid #1f2937', padding: '10px 14px', flexShrink: 0, zIndex: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ color: '#60a5fa', fontWeight: 800, fontSize: 20, letterSpacing: -0.5 }}>PropFind</div>
              <span style={{ background: '#064e3b', border: '1px solid #065f46', color: '#34d399', fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 10, letterSpacing: 0.5 }}>LIVE</span>
            </div>
            <div style={{ color: '#4b5563', fontSize: 11, marginTop: 1 }}>Sydney Inner City & West</div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => setListVisible(p => !p)} style={{ background: listVisible ? '#1e3a5f' : '#1f2937', border: `1px solid ${listVisible ? '#3b82f6' : '#374151'}`, borderRadius: 10, padding: '7px 13px', color: listVisible ? '#60a5fa' : '#9ca3af', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
              {listVisible ? '🗺 Map' : '☰ List'}
            </button>
            <button onClick={() => setShowFilters(true)} style={{ background: activeCount > 0 ? '#1e3a5f' : '#1f2937', border: `1px solid ${activeCount > 0 ? '#3b82f6' : '#374151'}`, borderRadius: 10, padding: '7px 13px', color: activeCount > 0 ? '#60a5fa' : '#9ca3af', fontSize: 12, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
              ⚙️ Filters {activeCount > 0 && <span style={{ background: '#ef4444', borderRadius: 10, padding: '0 5px', fontSize: 10, fontWeight: 700, color: 'white' }}>{activeCount}</span>}
            </button>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ display: 'flex', background: '#1f2937', borderRadius: 10, padding: 3, gap: 2 }}>
            {[['buy', 'For Sale'], ['sold', 'Sold (12mo)']].map(([v, label]) => (
              <button key={v} onClick={() => setFilters(p => ({ ...p, listingType: v }))} style={{ padding: '5px 14px', borderRadius: 8, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 600, background: filters.listingType === v ? '#2563eb' : 'transparent', color: filters.listingType === v ? 'white' : '#6b7280', transition: 'all 0.15s' }}>
                {label}
              </button>
            ))}
          </div>
          <span style={{ color: '#4b5563', fontSize: 12 }}>{listings.length} listing{listings.length !== 1 ? 's' : ''}</span>
        </div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0 }}>
          <MapView listings={listings} selectedId={selectedId} onSelect={handleSelect} />
        </div>
        {listVisible && (
          <div ref={listRef} className="scroll" style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: '100%', maxWidth: 380, background: 'rgba(3,7,18,0.97)', borderLeft: '1px solid #1f2937', overflowY: 'auto', padding: 12, zIndex: 5 }}>
            {listings.length === 0
              ? <div style={{ color: '#4b5563', textAlign: 'center', paddingTop: 80 }}><div style={{ fontSize: 48, marginBottom: 12 }}>🔍</div><div style={{ fontSize: 15 }}>No listings match your filters</div></div>
              : listings.map(l => <Card key={l.id} listing={l} selected={selectedId === l.id} onClick={() => handleSelect(l)} />)
            }
          </div>
        )}
      </div>

      {showFilters && <FilterPanel filters={filters} onApply={f => setFilters(f)} onClose={() => setShowFilters(false)} allListings={allListings} />}
      {selected && <Detail listing={selected} onClose={() => setSelectedId(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
