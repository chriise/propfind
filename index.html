const fmt = (n) => {
  if (!n) return null;
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 2).replace(/\.?0+$/, '') + 'm';
  return '$' + n.toLocaleString('en-AU');
};
const fmtRange = (min, max) => {
  if (!min && !max) return null;
  if (min && max && min !== max) return `${fmt(min)} – ${fmt(max)}`;
  return fmt(min || max);
};
const fmtDate = (d, opts = {}) => new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', ...opts });

// ─────────────────────────────────────────────────────────────
// MAP MARKER ICONS
// ─────────────────────────────────────────────────────────────
const makeIcon = (listing, selected) => {
  const sold = listing.status === 'sold';
  const bg = selected ? '#1d4ed8' : sold ? '#c2410c' : '#065f46';
  const border = selected ? '#93c5fd' : sold ? '#fdba74' : '#6ee7b7';
  const sp = listing._meta.soldPrice;
  const pg = listing._meta.priceGuide;
  const label = sp ? fmt(sp) : pg ? fmt(pg.min) + '+' : '?';
  const size = selected ? 14 : 11;
  const zOffset = selected ? 1000 : 0;

  return L.divIcon({
    className: '',
    html: `<div class="marker-pill" style="background:${bg};color:white;padding:3px 8px;border-radius:10px;font-size:${size}px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:1.5px solid ${border};font-family:system-ui,sans-serif;cursor:pointer;letter-spacing:-0.2px">${label}</div>`,
    iconSize: null,
    iconAnchor: [0, 12],
    zIndexOffset: zOffset,
  });
};

const MapView = ({ listings, selectedId, onSelect }) => {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef({});

  useEffect(() => {
    if (mapRef.current) return;
    mapRef.current = L.map(containerRef.current, {
      center: [-33.885, 151.19],
      zoom: 13,
      zoomControl: false,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_no_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapRef.current);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19, opacity: 0.8 }).addTo(mapRef.current);
    L.control.zoom({ position: 'bottomright' }).addTo(mapRef.current);
  }, []);

  useEffect(() => {
    if (!mapRef.current) return;
    const existing = new Set(Object.keys(markersRef.current));
    const incoming = new Set(listings.map(l => l.id));
    existing.forEach(id => {
      if (!incoming.has(id)) { markersRef.current[id].remove(); delete markersRef.current[id]; }
    });
    listings.forEach(l => {
      const sel = l.id === selectedId;
      if (markersRef.current[l.id]) {
        markersRef.current[l.id].setIcon(makeIcon(l, sel));
        markersRef.current[l.id].setZIndexOffset(sel ? 1000 : 0);
      } else {
        const m = L.marker([l.coordinates.lat, l.coordinates.lng], { icon: makeIcon(l, sel) })
          .addTo(mapRef.current)
          .on('click', () => onSelect(l));
        markersRef.current[l.id] = m;
      }
    });
  }, [listings, selectedId]);

  useEffect(() => {
    if (!mapRef.current || !selectedId) return;
    const l = ALL_LISTINGS.find(x => x.id === selectedId);
    if (l) mapRef.current.panTo([l.coordinates.lat, l.coordinates.lng], { animate: true, duration: 0.4 });
  }, [selectedId]);

  return <div ref={containerRef} style={{ height: '100%', width: '100%' }} />;
};

const INIT_FILTERS = { listingType: 'buy', postcodes: [], propertyTypes: [], priceMin: '', priceMax: '', bedrooms: 0, bathrooms: 0, carSpaces: 0, landSizeMin: '', landSizeMax: '' };

const applyFilters = (listings, f) => listings.filter(l => {
  if (f.listingType === 'buy' && (l.status !== 'active' || l.listingType !== 'buy')) return false;
  if (f.listingType === 'sold') {
    if (l.status !== 'sold') return false;
    if (new Date(l.soldDate) < TWELVE_MONTHS_AGO) return false;
  }
  if (f.postcodes.length && !f.postcodes.includes(l.address.postcode)) return false;
  if (f.propertyTypes.length && !f.propertyTypes.includes(l.propertyType)) return false;
  const pricePt = l._meta.soldPrice || l._meta.priceGuide?.min;
  if (f.priceMin && pricePt && pricePt < +f.priceMin) return false;
  if (f.priceMax && pricePt && pricePt > +f.priceMax) return false;
  if (f.bedrooms > 0 && l.bedrooms < f.bedrooms) return false;
  if (f.bathrooms > 0 && l.bathrooms < f.bathrooms) return false;
  if (f.carSpaces > 0 && l.carSpaces < f.carSpaces) return false;
  if (f.landSizeMin && l.landSize && l.landSize < +f.landSizeMin) return false;
  if (f.landSizeMax && l.landSize && l.landSize > +f.landSizeMax) return false;
  return true;
});

          <div style={{ display: 'flex', background: '#1f2937', borderRadius: 10, padding: 3, gap: 2 }}>
            {[['buy', 'For Sale'], ['sold', 'Sold (12mo)']].map(([v, label]) => (
              <button key={v} onClick={() => setFilters(p => ({ ...p, listingType: v }))} style={{ padding: '5px 14px', borderRadius: 8, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 600, background: filters.listingType === v ? '#2563eb' : 'transparent', color: filters.listingType === v ? 'white' : '#6b7280', transition: 'all 0.15s' }}>
                {label}
              </button>
            ))}
          </div>
          <span style={{ color: '#4b5563', fontSize: 12 }}>{listings.length} listing{listings.length !== 1 ? 's' : ''}</span>
        </div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
        {/* Map always in background */}
        <div style={{ position: 'absolute', inset: 0 }}>
          <MapView listings={listings} selectedId={selectedId} onSelect={handleSelect} />
        </div>

        {/* List panel */}
        {listVisible && (
          <div ref={listRef} className="scroll" style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: '100%', maxWidth: 380, background: 'rgba(3,7,18,0.97)', borderLeft: '1px solid #1f2937', overflowY: 'auto', padding: 12, zIndex: 5 }}>
            {listings.length === 0
              ? <div style={{ color: '#4b5563', textAlign: 'center', paddingTop: 80 }}><div style={{ fontSize: 48, marginBottom: 12 }}>🔍</div><div style={{ fontSize: 15 }}>No listings match your filters</div></div>
              : listings.map(l => <Card key={l.id} listing={l} selected={selectedId === l.id} onClick={() => handleSelect(l)} />)
            }
          </div>
        )}
      </div>

      {showFilters && <FilterPanel filters={filters} onApply={f => { setFilters(f); }} onClose={() => setShowFilters(false)} />}
      {selected && <Detail listing={selected} onClose={() => setSelectedId(null)} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
